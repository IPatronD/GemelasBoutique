<div class="layout">

    <aside class="sidebar" [class.cerrado]="!menuAbierto">

        <div class="sidebar-logo">
            <span class="logo-icon">👗</span>
            <span class="logo-texto" *ngIf="menuAbierto">Gemelas Boutique</span>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-seccion" *ngIf="menuAbierto">PRINCIPAL</div>
            <a class="nav-item" (click)="navegarA('/supervisora/dashboard')">
                <span class="nav-icon">📊</span>
                <span class="nav-texto" *ngIf="menuAbierto">Dashboard</span>
            </a>

            <div class="nav-seccion" *ngIf="menuAbierto">SUPERVISIÓN</div>
            <a class="nav-item" (click)="navegarA('/supervisora/ventas')">
                <span class="nav-icon">🛒</span>
                <span class="nav-texto" *ngIf="menuAbierto">Ventas</span>
            </a>
            <a class="nav-item" (click)="navegarA('/supervisora/clientes')">
                <span class="nav-icon">👥</span>
                <span class="nav-texto" *ngIf="menuAbierto">Clientes</span>
            </a>
            <a class="nav-item" (click)="navegarA('/supervisora/productos')">
                <span class="nav-icon">📦</span>
                <span class="nav-texto" *ngIf="menuAbierto">Productos</span>
            </a>

            <div class="nav-seccion" *ngIf="menuAbierto">CUENTA</div>
            <a class="nav-item" (click)="navegarA('/supervisora/perfil')">
                <span class="nav-icon">👤</span>
                <span class="nav-texto" *ngIf="menuAbierto">Mi Perfil</span>
            </a>
            <a class="nav-item logout" (click)="logout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-texto" *ngIf="menuAbierto">Cerrar Sesión</span>
            </a>

        </nav>

    </aside>

    <div class="contenido">

        <header class="topbar">
            <button class="btn-toggle" (click)="toggleMenu()">☰</button>
            <span class="topbar-titulo">Panel Supervisora</span>
            <div class="topbar-usuario">
                <span>👗 Gemelas Boutique</span>
            </div>
        </header>

        <main class="main-content">
            <router-outlet />
        </main>

    </div>

</div>
