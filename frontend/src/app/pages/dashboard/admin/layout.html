<div class="layout">

  <!-- SIDEBAR — barra lateral de navegación -->
  <aside class="sidebar" [class.cerrado]="!menuAbierto">

    <!-- Logo de la boutique -->
    <div class="sidebar-logo">
      <span class="logo-icon">👗</span>
      <span class="logo-texto" *ngIf="menuAbierto">Gemelas Boutique</span>
    </div>

    <!-- Menú de navegación -->
    <nav class="sidebar-nav">

      <!-- Sección: Principal -->
      <div class="nav-seccion" *ngIf="menuAbierto">PRINCIPAL</div>
      <a class="nav-item" (click)="navegarA('/admin/dashboard')">
        <span class="nav-icon">📊</span>
        <span class="nav-texto" *ngIf="menuAbierto">Dashboard</span>
      </a>

      <!-- Sección: Gestión operativa -->
      <div class="nav-seccion" *ngIf="menuAbierto">GESTIÓN</div>
      <a class="nav-item" (click)="navegarA('/admin/ventas')">
        <span class="nav-icon">🛒</span>
        <span class="nav-texto" *ngIf="menuAbierto">Ventas</span>
      </a>
      <a class="nav-item" (click)="navegarA('/admin/clientes')">
        <span class="nav-icon">👥</span>
        <span class="nav-texto" *ngIf="menuAbierto">Clientes</span>
      </a>
      <a class="nav-item" (click)="navegarA('/admin/productos')">
        <span class="nav-icon">📦</span>
        <span class="nav-texto" *ngIf="menuAbierto">Productos</span>
      </a>

      <!-- Sección: Administración del sistema -->
      <div class="nav-seccion" *ngIf="menuAbierto">ADMINISTRACIÓN</div>
      <a class="nav-item" (click)="navegarA('/admin/empleados')">
        <span class="nav-icon">👩‍💼</span>
        <span class="nav-texto" *ngIf="menuAbierto">Empleados</span>
      </a>
      <a class="nav-item" (click)="navegarA('/admin/usuarios')">
        <span class="nav-icon">🔐</span>
        <span class="nav-texto" *ngIf="menuAbierto">Usuarios</span>
      </a>
      <a class="nav-item" (click)="navegarA('/admin/categorias')">
        <span class="nav-icon">🏷️</span>
        <span class="nav-texto" *ngIf="menuAbierto">Categorías</span>
      </a>
      <a class="nav-item" (click)="navegarA('/admin/metodos-pago')">
        <span class="nav-icon">💳</span>
        <span class="nav-texto" *ngIf="menuAbierto">Métodos de Pago</span>
      </a>

      <!-- Sección: Cuenta del usuario -->
      <div class="nav-seccion" *ngIf="menuAbierto">CUENTA</div>
      <a class="nav-item" (click)="navegarA('/admin/perfil')">
        <span class="nav-icon">👤</span>
        <span class="nav-texto" *ngIf="menuAbierto">Mi Perfil</span>
      </a>
      <!-- Botón de cerrar sesión -->
      <a class="nav-item logout" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-texto" *ngIf="menuAbierto">Cerrar Sesión</span>
      </a>

    </nav>

  </aside>

  <!-- CONTENIDO PRINCIPAL — área derecha de la pantalla -->
  <div class="contenido">

    <!-- TOPBAR — barra superior -->
    <header class="topbar">
      <!-- Botón para abrir/cerrar el sidebar -->
      <button class="btn-toggle" (click)="toggleMenu()">☰</button>
      <span class="topbar-titulo">Panel Administrador</span>
      <div class="topbar-usuario">
        <span>👗 Gemelas Boutique</span>
      </div>
    </header>

    <!-- PÁGINA ACTIVA — aquí se renderiza el componente hijo según la ruta -->
    <main class="main-content">
      <router-outlet />
    </main>

  </div>

</div>
